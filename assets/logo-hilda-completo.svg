<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&amp;family=Source+Sans+3:wght@300&amp;display=swap');
      .nome {
        font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
        font-size: 38px;
        font-weight: 400;
        fill: #2C3E50;
        letter-spacing: 0.5px;
      }
      .tagline {
        font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif;
        font-size: 13px;
        font-weight: 300;
        fill: #7F8C8D;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
    </style>
  </defs>

  <!-- Fundo transparente -->

  <!-- Nome principal -->
  <text x="240" y="58" class="nome" text-anchor="middle">Hilda Teixeira da Costa</text>

  <!-- Linha de acento terracota — 62% da largura total, centralizada -->
  <line x1="148" y1="72" x2="332" y2="72" stroke="#C0845A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="240" y="98" class="tagline" text-anchor="middle">Psicanalista · Conflitos Humanos</text>

</svg>
